{
  "exceptionHandlerLogTarget": "none",
  "serilog": false,
  "listen": {
    "version": true,
    "ResponseCancelAfter": 10
  },
  "BaseModule": {
    "ValidateRequest": false,
    "ValidateIdentity": false,
    "BlockedBots": false,
    "SkipModules": [
      "Catalog",
      "DLNA",
      "Tracks",
      "Transcoding",
      "Sync"
    ],
    "Middlewares": {
      "staticFiles": true,
      "staticFilesMappings": {
        ".m4s": "video/mp4",
        ".ts": "video/mp2t",
        ".mp4": "video/mp4",
        ".mkv": "video/x-matroska",
        ".m3u": "application/x-mpegURL",
        ".m3u8": "application/vnd.apple.mpegurl",
        ".webm": "video/webm",
        ".m2ts": "video/MP2T"
      }
    }
  },
  "pool": {
    "BufferSize": 32000,
    "BufferMax": 50000000,
    "BufferByteSmallMaxCount": 4,
    "BufferByteMediumMaxCount": 1,
    "BufferByteLargeMaxCount": 0,
    "BufferCharSmallMaxCount": 4,
    "BufferCharMediumMaxCount": 1,
    "BufferCharLargeMaxCount": 0,
    "BufferWriterSmallMaxCount": 4,
    "BufferWriterLargeMaxCount": 0,
    "StringBuilderLargeMaxCount": 4,
    "NewtonsoftCharMediumMaxCount": 2,
    "NewtonsoftCharLargeMaxCount": 2
  },
  "cache": {
    "extend": 180
  },
  "serverproxy": {
    "verifyip": false,
    "image": {
      "cache_time": 60
    }
  },
  "tmdb": {
    "cache_img": 60
  },
  "WAF": {
    "enable": false
  },
  "accsdb": {
    "enable": false
  }
}
